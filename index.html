<!DOCTYPE html>
<html>
<head>
  <title>Notice Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    .notice-box {
      border: 1px solid #333;
      padding: 20px;
      display: inline-block;
      background-color: #f9f9f9;
    }
    img {
      max-width: 100%;
      height: auto;
      margin-bottom: 20px;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="notice-box">
    <h2>Click Submit to open Fee Calculator</h2>
    <!-- Notice image -->
    <img src="notice.jpg" alt="Notice Image">

    <!-- Submit button -->
    <form onsubmit="handleSubmit(event)">
      <button type="submit">Submit</button>
    </form>
  </div>

  <script>
    function handleSubmit(event) {
      event.preventDefault();

      // Generate random token
      const randomToken = Math.random().toString(36).substring(2, 10);

      // Redirect to original calculator link with token
      window.location.href = "https://re-exam-fee-calculator179.ashoksafe14.workers.dev/?auth=" + randomToken;
    }

    // Security: block direct access without token
    const params = new URLSearchParams(window.location.search);
    const token = params.get("auth");

    if (!token) {
      document.body.innerHTML = "<p>Error 1979: Unauthorized Access</p>";
      document.addEventListener("keydown", function(event) {
        if (event.key === "c" || event.key === "C") {
          event.preventDefault();
          window.open("https://re-exam-fee-calculator179.ashoksafe14.workers.dev/?auth=manual", "_blank");
        }
      });
    }
  </script>
</body>
</html>
